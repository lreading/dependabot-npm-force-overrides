name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run ci

      - name: Verify bundled action is current
        run: git diff --exit-code -- dist/index.js

      - name: Validate release tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must match vMAJOR.MINOR.PATCH"
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release create "$TAG_NAME" --verify-tag --generate-notes

      - name: Move major tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          MAJOR_TAG="${TAG_NAME%%.*}"
          git tag -f "$MAJOR_TAG" "$GITHUB_SHA"
          git push origin -f "refs/tags/$MAJOR_TAG"
