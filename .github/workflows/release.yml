name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run ci

      - name: Verify bundled action is current
        run: git diff --exit-code -- dist/index.js

      - name: Validate release tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if [[ ! "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tags must match vMAJOR.MINOR.PATCH"
            exit 1
          fi

      - name: Resolve release commit
        id: release-commit
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          RELEASE_SHA="$(git rev-list -n 1 "$TAG_NAME")"
          echo "sha=$RELEASE_SHA" >> "$GITHUB_OUTPUT"

      - name: Update README release example
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          RELEASE_SHA: ${{ steps.release-commit.outputs.sha }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          git fetch origin "$DEFAULT_BRANCH"
          git checkout -B "$DEFAULT_BRANCH" "origin/$DEFAULT_BRANCH"

          node scripts/update-readme-release-example.mjs README.md "$TAG_NAME" "$RELEASE_SHA"

          if git diff --quiet -- README.md; then
            echo "README already references $TAG_NAME at $RELEASE_SHA"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update release example for $TAG_NAME"
          git push origin "HEAD:$DEFAULT_BRANCH"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: gh release create "$TAG_NAME" --verify-tag --generate-notes

      - name: Move major tag
        env:
          RELEASE_SHA: ${{ steps.release-commit.outputs.sha }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          MAJOR_TAG="${TAG_NAME%%.*}"
          git tag -f "$MAJOR_TAG" "$RELEASE_SHA"
          git push origin -f "refs/tags/$MAJOR_TAG"
