name: Dependabot npm force overrides
description: Updates npm Dependabot PRs with package.json overrides for transitive lockfile updates.
author: dependabot-npm-force-overrides contributors
inputs:
  github-token:
    description: GitHub token used to push the override commit.
    required: true
    default: ${{ github.token }}
  package-roots:
    description: Newline-separated npm package roots to inspect. Defaults to auto-detection from changed package-lock.json files.
    required: false
  dry-run:
    description: Report planned changes without writing, committing, or pushing.
    required: false
    default: 'false'
  skip-label:
    description: PR label that causes the action to no-op.
    required: false
  commit-user-name:
    description: Git user.name value for the generated override commit.
    required: false
    default: dependabot-npm-force-overrides
  commit-user-email:
    description: Git user.email value for the generated override commit.
    required: false
    default: dependabot-npm-force-overrides@users.noreply.github.com
  sign-commit:
    description: Sign the generated override commit with git commit -S. Requires ssh-signing-key.
    required: false
    default: 'false'
  ssh-signing-key:
    description: Private SSH key used to sign the generated override commit when sign-commit is true.
    required: false
outputs:
  changed:
    description: Whether package.json overrides needed changes.
  committed:
    description: Whether the action created a commit.
  pushed:
    description: Whether the action pushed a commit to the PR branch.
runs:
  using: node24
  main: dist/index.js
branding:
  icon: shield
  color: blue
